apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vanshtyagii0/cicd-gitops-project.git
    targetRevision: main
    path: k8s/python-backend
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---

apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: java-backend-pipeline
  namespace: tekton-pipelines
spec:
  workspaces:
    - name: source
    - name: docker-config
  params:
    - name: repo-url
      type: string
      default: "https://github.com/Vanshtyagii0/cicd-gitops-project.git"
    - name: image-ref
      type: string
      default: "vanshtyagi1/java-backend"
    - name: image-tag
      type: string
      default: "v1.0"
  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.repo-url)

    - name: maven-build
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: source
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: build
            image: maven:3.9.5-eclipse-temurin-17
            script: |
              #!/bin/sh
              echo "========================================"
              echo "  JAVA BACKEND - MAVEN BUILD STEP      "
              echo "========================================"
              cd /workspace/source/apps/java-backend
              echo "[1] Maven clean package chal raha hai..."
              mvn clean package -DskipTests -q
              echo "[2] JAR file check:"
              ls -la target/*.jar
              echo "[3] Java Maven Build Complete ✓"
              echo "========================================"

    - name: docker-build-push
      taskRef:
        name: kaniko
      runAfter: [maven-build]
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: docker-config
      params:
        - name: IMAGE
          value: "$(params.image-ref):$(params.image-tag)"
        - name: CONTEXT
          value: apps/java-backend
        - name: DOCKERFILE
          value: apps/java-backend/Dockerfile

    - name: update-manifest
      runAfter: [docker-build-push]
      workspaces:
        - name: source
          workspace: source
      taskSpec:
        workspaces:
          - name: source
        params:
          - name: image-ref
            type: string
          - name: image-tag
            type: string
        steps:
          - name: update
            image: alpine/git:latest
            script: |
              #!/bin/sh
              echo "========================================"
              echo "  JAVA - UPDATE MANIFEST STEP          "
              echo "========================================"
              cd /workspace/source
              echo "[1] Image tag update ho raha hai..."
              sed -i "s|image: $(params.image-ref):.*|image: $(params.image-ref):$(params.image-tag)|g" k8s/java-backend/deployment.yaml
              echo "[2] Updated deployment.yaml:"
              cat k8s/java-backend/deployment.yaml
              echo "[3] Git commit ho raha hai..."
              git config --global user.email "tekton@cicd.com"
              git config --global user.name "Tekton Pipeline"
              git add k8s/java-backend/deployment.yaml
              git commit -m "ci: Java image updated to $(params.image-tag)"
              echo "========================================"
              echo "  MANIFEST UPDATED - ArgoCD Sync Hoga ✓"
              echo "========================================"
      params:
        - name: image-ref
          value: $(params.image-ref)
        - name: image-tag
          value: $(params.image-tag)

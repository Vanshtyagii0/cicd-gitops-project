apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: angular-frontend-pipeline
  namespace: tekton-pipelines
spec:
  workspaces:
    - name: source
    - name: docker-config
  params:
    - name: repo-url
      type: string
      default: "https://github.com/Vanshtyagii0/cicd-gitops-project.git"
    - name: image-ref
      type: string
      default: "vanshtyagi1/angular-frontend"
    - name: image-tag
      type: string
      default: "v1.0"
  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.repo-url)

    - name: npm-build
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: source
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: build
            image: node:20-alpine
            script: |
              #!/bin/sh
              echo "========================================"
              echo "  ANGULAR FRONTEND - NPM BUILD STEP    "
              echo "========================================"
              cd /workspace/source/apps/angular-frontend
              echo "[1] NPM dependencies install ho rahi hain..."
              npm ci --silent
              echo "[2] Angular build chal raha hai..."
              npm run build
              echo "[3] Build output check:"
              ls -la dist/
              echo "[4] Angular Build Complete ✓"
              echo "========================================"

    - name: docker-build-push
      taskRef:
        name: kaniko
      runAfter: [npm-build]
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: docker-config
      params:
        - name: IMAGE
          value: "$(params.image-ref):$(params.image-tag)"
        - name: CONTEXT
          value: apps/angular-frontend
        - name: DOCKERFILE
          value: apps/angular-frontend/Dockerfile

    - name: update-manifest
      runAfter: [docker-build-push]
      workspaces:
        - name: source
          workspace: source
      taskSpec:
        workspaces:
          - name: source
        params:
          - name: image-ref
            type: string
          - name: image-tag
            type: string
        steps:
          - name: update
            image: alpine/git:latest
            script: |
              #!/bin/sh
              echo "========================================"
              echo "  ANGULAR - UPDATE MANIFEST STEP       "
              echo "========================================"
              cd /workspace/source
              echo "[1] Image tag update ho raha hai..."
              sed -i "s|image: $(params.image-ref):.*|image: $(params.image-ref):$(params.image-tag)|g" k8s/angular-frontend/deployment.yaml
              echo "[2] Updated deployment.yaml:"
              cat k8s/angular-frontend/deployment.yaml
              echo "[3] Git commit ho raha hai..."
              git config --global user.email "tekton@cicd.com"
              git config --global user.name "Tekton Pipeline"
              git add k8s/angular-frontend/deployment.yaml
              git commit -m "ci: Angular image updated to $(params.image-tag)"
              echo "========================================"
              echo "  MANIFEST UPDATED - ArgoCD Sync Hoga ✓"
              echo "========================================"
      params:
        - name: image-ref
          value: $(params.image-ref)
        - name: image-tag
          value: $(params.image-tag)
